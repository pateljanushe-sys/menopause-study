    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a4d2e;
            --primary-light: #2d6a45;
            --accent: #d4a574;
            --accent-bright: #e8b887;
            --bg-cream: #f8f6f1;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #4a4a4a;
            --text-light: #7a7a7a;
            --border: #e0ddd5;
            --shadow: rgba(26, 77, 46, 0.08);
            --shadow-heavy: rgba(26, 77, 46, 0.15);
            --correct: #2d6a45;
            --incorrect: #c1403d;
            --warning: #e8b887;
        }

        /* Dark Mode */
        [data-theme="dark"] {
            --primary: #4ade80;
            --primary-light: #86efac;
            --accent: #fbbf24;
            --accent-bright: #fcd34d;
            --bg-cream: #0f172a;
            --bg-white: #1e293b;
            --text-dark: #f1f5f9;
            --text-mid: #cbd5e1;
            --text-light: #94a3b8;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-heavy: rgba(0, 0, 0, 0.5);
            --correct: #4ade80;
            --incorrect: #f87171;
            --warning: #fbbf24;
        }

        [data-theme="dark"] .logo-icon {
            background: linear-gradient(135deg, #166534, #22c55e);
        }

        [data-theme="dark"] .header {
            background: #1e293b;
            border-bottom-color: #334155;
        }

        [data-theme="dark"] img {
            opacity: 0.9;
        }

        /* Dark Mode Toggle */
        .theme-toggle {
            background: none;
            border: 2px solid var(--primary);
            color: var(--primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        [data-theme="dark"] .theme-toggle {
            border-color: var(--accent);
            color: var(--accent);
        }

        [data-theme="dark"] .theme-toggle:hover {
            background: var(--accent);
            color: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'DM Sans', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4 {
            font-family: 'Crimson Pro', serif;
            font-weight: 600;
            line-height: 1.2;
        }

        /* Header - same as before */
        .header {
            background: var(--bg-white);
            border-bottom: 2px solid var(--border);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Crimson Pro', serif;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.1rem;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-heavy);
        }

        .nav-btn.primary {
            background: var(--primary);
            color: white;
        }

        .nav-btn.primary:hover {
            background: var(--primary-light);
        }

        /* Main Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 3rem;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 2rem;
            height: fit-content;
            position: sticky;
            top: 120px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
        }

        .progress-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .progress-section h3 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .progress-bar {
            background: var(--border);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            height: 100%;
            transition: width 0.6s ease;
            border-radius: 6px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-mid);
            text-align: center;
        }

        .week-selector {
            list-style: none;
        }

        .week-item {
            padding: 0.9rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .week-item:hover {
            background: var(--bg-cream);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .week-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--shadow-heavy);
        }

        .week-item.completed {
            background: var(--accent-bright);
            color: var(--text-dark);
        }

        .week-check {
            font-size: 1.2rem;
        }

        /* Main Content */
        .main-content {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            min-height: 600px;
        }

        .content-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .content-header h2 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .content-meta {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-mid);
        }

        .meta-icon {
            width: 20px;
            height: 20px;
            background: var(--accent-bright);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* Detailed Content Sections */
        .detail-section {
            margin: 2rem 0;
            padding: 2rem;
            background: var(--bg-cream);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .detail-section h3 {
            color: var(--primary);
            margin-bottom: 1.2rem;
            font-size: 1.6rem;
        }

        .detail-section h4 {
            color: var(--primary-light);
            margin: 1.5rem 0 0.8rem 0;
            font-size: 1.2rem;
        }

        .detail-section p {
            margin-bottom: 1rem;
            line-height: 1.8;
            color: var(--text-mid);
        }

        .detail-section ul, .detail-section ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            line-height: 2;
        }

        .detail-section li {
            margin-bottom: 0.8rem;
            color: var(--text-mid);
        }

        .detail-section strong {
            color: var(--text-dark);
            font-weight: 600;
        }

        .highlight-box {
            background: linear-gradient(135deg, #fff9f0, #fef8f1);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .highlight-box h4 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .clinical-pearl {
            background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
            border-left: 4px solid var(--primary-light);
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .clinical-pearl::before {
            content: "💎 Clinical Pearl";
            display: block;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.8rem;
        }

        .exam-tip {
            background: linear-gradient(135deg, #fff3cd, #fcf8e8);
            border-left: 4px solid #ffc107;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .exam-tip::before {
            content: "🎯 Exam Tip";
            display: block;
            font-weight: 700;
            color: #856404;
            margin-bottom: 0.8rem;
        }

        /* Quiz Styles */
        .quiz-container {
            margin-top: 2rem;
        }

        .quiz-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 2rem;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .quiz-header h3 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .quiz-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 1rem;
        }

        .quiz-stat {
            text-align: center;
        }

        .quiz-stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .quiz-stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .quiz-body {
            background: white;
            border: 2px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 2rem;
        }

        .question-card {
            background: var(--bg-cream);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .question-card.answered {
            border-color: var(--accent);
        }

        .question-card.correct {
            background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
            border-color: var(--correct);
        }

        .question-card.incorrect {
            background: linear-gradient(135deg, #ffebee, #fce4ec);
            border-color: var(--incorrect);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .question-number {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .question-difficulty {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .difficulty-easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-hard {
            background: #f8d7da;
            color: #721c24;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .question-stem {
            background: white;
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-style: italic;
            border-left: 3px solid var(--accent);
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .option-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .option-letter {
            background: var(--bg-cream);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            line-height: 1.6;
        }

        .option-item.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .option-item.selected .option-letter {
            background: white;
            color: var(--primary);
        }

        .option-item.correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
        }

        .option-item.correct .option-letter {
            background: white;
            color: var(--correct);
        }

        .option-item.incorrect {
            background: var(--incorrect);
            color: white;
            border-color: var(--incorrect);
        }

        .option-item.incorrect .option-letter {
            background: white;
            color: var(--incorrect);
        }

        .explanation {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation-header {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .explanation-content {
            line-height: 1.8;
            color: var(--text-mid);
        }

        .explanation-content strong {
            color: var(--text-dark);
        }

        .reference {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
        }

        .quiz-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-heavy);
        }

        /* Patient Guides Styles */
        .guides-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .guide-card {
            background: var(--bg-white);
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
        }

        .guide-card:hover {
            border-color: var(--accent);
            transform: translateY(-6px);
            box-shadow: 0 12px 32px var(--shadow-heavy);
        }

        .guide-card-accent {
            height: 6px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .guide-card-body {
            padding: 1.8rem;
        }

        .guide-card-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 1.2rem;
            background: linear-gradient(135deg, var(--bg-cream), white);
            border: 1px solid var(--border);
        }

        .guide-card h3 {
            font-size: 1.15rem;
            color: var(--primary);
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }

        .guide-card p {
            font-size: 0.9rem;
            color: var(--text-mid);
            line-height: 1.6;
            margin-bottom: 1rem;
        }

        .guide-card-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .guide-card-tag {
            display: inline-block;
            padding: 0.25rem 0.7rem;
            background: var(--bg-cream);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            border: 1px solid var(--border);
        }

        /* Patient Guide Detail View */
        .guide-detail {
            animation: fadeIn 0.5s ease;
        }

        .guide-detail-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 16px;
            padding: 2.5rem;
            color: white;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .guide-detail-header::after {
            content: '';
            position: absolute;
            top: -40%;
            right: -10%;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.06);
            pointer-events: none;
        }

        .guide-detail-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }

        .guide-detail-header .guide-subtitle {
            opacity: 0.85;
            font-size: 1.05rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .guide-section {
            background: var(--bg-white);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: box-shadow 0.3s ease;
        }

        .guide-section:hover {
            box-shadow: 0 4px 16px var(--shadow);
        }

        .guide-section h3 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--bg-cream);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .guide-section h4 {
            font-size: 1.05rem;
            color: var(--primary-light);
            margin: 1.2rem 0 0.6rem;
        }

        .guide-section p, .guide-section li {
            color: var(--text-mid);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .guide-section ul {
            list-style: none;
            padding: 0;
        }

        .guide-section ul li {
            padding: 0.5rem 0 0.5rem 1.6rem;
            position: relative;
        }

        .guide-section ul li::before {
            content: '•';
            position: absolute;
            left: 0.4rem;
            color: var(--accent);
            font-weight: 700;
            font-size: 1.2rem;
        }

        .guide-callout {

// Main Application Logic
let currentProgress = 0;
let completedWeeks = new Set();
let quizState = {
    currentQuiz: null,
    currentQuestionIndex: 0,
    answers: {},
    score: 0,
    showingResults: false
};

// Initialize application
function init() {
    renderWeekSelector();
    showWelcomeScreen();
    loadProgress();
}

// Load saved progress from localStorage
function loadProgress() {
    const saved = localStorage.getItem('menopauseStudyProgress');
    if (saved) {
        const data = JSON.parse(saved);
        completedWeeks = new Set(data.completedWeeks || []);
        currentProgress = (completedWeeks.size / studyData.weeks.length) * 100;
        updateProgressBar();
    }
}

// Save progress to localStorage
function saveProgress() {
    const data = {
        completedWeeks: Array.from(completedWeeks),
        lastUpdated: new Date().toISOString()
    };
    localStorage.setItem('menopauseStudyProgress', JSON.stringify(data));
}

// Update progress bar
function updateProgressBar() {
    document.getElementById('progressBar').style.width = currentProgress + '%';
    document.getElementById('progressText').textContent = 
        `${completedWeeks.size} of ${studyData.weeks.length} weeks completed`;
}

// Render week selector in sidebar
function renderWeekSelector() {
    const selector = document.getElementById('weekSelector');
    selector.innerHTML = '';

    studyData.weeks.forEach((week, index) => {
        const li = document.createElement('li');
        li.className = 'week-item';
        if (completedWeeks.has(index)) {
            li.classList.add('completed');
        }
        
        li.innerHTML = `
            <span>Week ${week.week}: ${week.title}</span>
            <span class="week-check">${completedWeeks.has(index) ? '✓' : ''}</span>
        `;
        
        li.onclick = () => showWeekDetail(index);
        selector.appendChild(li);
    });
}

// Show welcome/overview screen
function showWelcomeScreen() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div style="text-align: center; padding: 4rem 2rem;">
            <h2 style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">

            </h2>
            <p style="font-size: 1.2rem; color: var(--text-mid); max-width: 700px; margin: 0 auto 3rem; line-height: 1.8;">

                the Menopause Society Certification Exam with confidence.
            </p>
            
            <div style="background: var(--bg-cream); border-radius: 12px; padding: 2rem; margin-top: 3rem;">
                <h3 style="color: var(--primary); margin-bottom: 1.5rem; font-size: 1.8rem;">
                    Your 10-Week Roadmap
                </h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                    ${studyData.weeks.map((week, index) => `

                            <div style="font-weight: 700; color: var(--primary); font-size: 1.1rem; margin-bottom: 0.5rem;">

// Mark week as complete
function markWeekComplete(weekIndex) {
    if (!completedWeeks.has(weekIndex)) {
        completedWeeks.add(weekIndex);
        currentProgress = Math.round((completedWeeks.size / studyData.weeks.length) * 100);
        updateProgressBar();
        renderWeekSelector();
        saveProgress();
        
        if (completedWeeks.size === studyData.weeks.length) {
            alert('🎉 Congratulations! You\'ve completed all 10 weeks! You\'re ready for the exam!');
        }
    }
}

// Show quiz view
function showView(view) {
    if (view === 'overview') {
        showWelcomeScreen();
    } else if (view === 'study') {
        showWeekDetail(0);
    } else if (view === 'quiz') {
        showQuizSelection();
    } else if (view === 'guides') {
        showPatientGuides();
    } else if (view === 'about') {
        showAboutUs();
    }
}

// Show quiz selection
function showQuizSelection() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="content-header">
            <h2>Practice Quizzes</h2>
            <p style="margin-top: 1rem; color: var(--text-mid);">
                Test your knowledge with these comprehensive practice questions
            </p>

                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// Start a quiz
function startQuiz(quizId) {
    const quiz = quizData.quizzes.find(q => q.id === quizId);
    if (!quiz || quiz.questions.length === 0) {
        alert('This quiz is coming soon!');
        return;
    }
    
    quizState = {
        currentQuiz: quiz,
        currentQuestionIndex: 0,
        answers: {},
        score: 0,
        showingResults: false
    };
    
    showQuestion();
}

// Show current question
function showQuestion() {
    const quiz = quizState.currentQuiz;
    const question = quiz.questions[quizState.currentQuestionIndex];
    const content = document.getElementById('mainContent');
    
    content.innerHTML = `
        <div class="quiz-container">
            <div class="quiz-header">
                <h3>${quiz.title}</h3>
                <div class="quiz-stats">
                    <div class="quiz-stat">
                        <span class="quiz-stat-number">${quizState.currentQuestionIndex + 1}</span>
                        <span class="quiz-stat-label">of ${quiz.questions.length}</span>
                    </div>
                    <div class="quiz-stat">
                        <span class="quiz-stat-number">${Object.keys(quizState.answers).length}</span>
                        <span class="quiz-stat-label">Answered</span>
                    </div>
                </div>
            </div>
            
            <div class="quiz-body">
                <div class="question-card ${quizState.answers[question.id] !== undefined ? 'answered' : ''}">
                    <div class="question-header">
                        <span class="question-number">Question ${quizState.currentQuestionIndex + 1}</span>
                        <span class="question-difficulty difficulty-${question.difficulty}">
                            ${question.difficulty.toUpperCase()}
                        </span>
                    </div>
                    
                    ${question.stem ? `<div class="question-stem">${question.stem}</div>` : ''}
                    
                    <div class="question-text">${question.question}</div>
                    
                    <ul class="options-list">
                        ${question.options.map((option, index) => {
                            const isSelected = quizState.answers[question.id] === index;
                            return `
                                <li class="option-item ${isSelected ? 'selected' : ''}" 
                                    onclick="selectAnswer(${question.id}, ${index})">
                                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                                    <div class="option-text">${option}</div>
                                </li>
                            `;
                        }).join('')}
                    </ul>
                    
                    <div class="explanation ${quizState.answers[question.id] !== undefined ? 'show' : ''}">
                        <div class="explanation-header">
                            ${quizState.answers[question.id] === question.correctAnswer ? '✅ Correct!' : '❌ Incorrect'}
                        </div>
                        <div class="explanation-content">
                            <strong>Correct Answer: ${String.fromCharCode(65 + question.correctAnswer)}</strong>
                            <p>${question.explanation}</p>
                        </div>
                        <div class="reference">📖 ${question.reference} | Topic: ${question.topic}</div>
                    </div>
                </div>
                
                <div class="quiz-actions">
                    <button class="btn btn-secondary" 
                            onclick="previousQuestion()" 
                            ${quizState.currentQuestionIndex === 0 ? 'disabled' : ''}>
                        ← Previous
                    </button>
                    
                    ${quizState.currentQuestionIndex < quiz.questions.length - 1 ? `
                        <button class="btn btn-primary" onclick="nextQuestion()">
                            Next Question →
                        </button>
                    ` : `
                        <button class="btn btn-primary" onclick="finishQuiz()">
                            Finish Quiz
                        </button>
                    `}
                </div>
            </div>
        </div>
    `;
}

// Select an answer
function selectAnswer(questionId, answerIndex) {
    if (quizState.answers[questionId] !== undefined) return; // Already answered
    
    quizState.answers[questionId] = answerIndex;
    showQuestion(); // Refresh to show explanation
}

// Navigate to next question
function nextQuestion() {
    if (quizState.currentQuestionIndex < quizState.currentQuiz.questions.length - 1) {
        quizState.currentQuestionIndex++;
        showQuestion();
    }
}

// Navigate to previous question
function previousQuestion() {
    if (quizState.currentQuestionIndex > 0) {
        quizState.currentQuestionIndex--;
        showQuestion();
    }
}

// Finish quiz and show results
function finishQuiz() {
    const quiz = quizState.currentQuiz;
    let correct = 0;
    
    quiz.questions.forEach(q => {
        if (quizState.answers[q.id] === q.correctAnswer) {
            correct++;
        }
    });
    
    const percentage = Math.round((correct / quiz.questions.length) * 100);
    const passed = percentage >= quiz.passingScore;
    
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="score-summary">
            <h3>Quiz Complete!</h3>
            <span class="score-number">${percentage}%</span>
            <div class="score-feedback">
                ${passed ? 
                    '🎉 Congratulations! You passed this quiz!' : 
                    '📚 Keep studying! Review the explanations and try again.'}
            </div>
            
            <div class="score-breakdown">
                <div class="breakdown-item">
                    <span class="breakdown-number">${correct}</span>
                    <span class="breakdown-label">Correct</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-number">${quiz.questions.length - correct}</span>
                    <span class="breakdown-label">Incorrect</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-number">${quiz.passingScore}%</span>
                    <span class="breakdown-label">Passing Score</span>
                </div>
            </div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-secondary" onclick="showQuizSelection()">
                    Back to Quizzes
                </button>
                <button class="btn btn-primary" onclick="startQuiz('${quiz.id}')">
                    Retake Quiz
                </button>
            </div>
        </div>
    `;
}

// ===== DARK MODE =====
function toggleTheme() {
    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('mm-theme', next);
    document.querySelector('.theme-toggle').textContent = next === 'dark' ? '☀️' : '🌙';
}

// Apply saved theme on load
(function() {
    const saved = localStorage.getItem('mm-theme');
    if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.addEventListener('DOMContentLoaded', function() {
            const toggle = document.querySelector('.theme-toggle');
            if (toggle) toggle.textContent = '☀️';
        });
    }
})();

// ===== PROGRESS PERSISTENCE (localStorage) =====
const STORAGE_KEY = 'mm-progress';

function saveProgress() {
    try {
        const progress = {
            completedWeeks: getCompletedWeeks(),
            quizScores: getQuizScores(),
            lastVisited: new Date().toISOString(),
            currentWeek: typeof currentWeek !== 'undefined' ? currentWeek : 0
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    } catch(e) { /* localStorage not available */ }
}

function loadProgress() {
    try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            const progress = JSON.parse(saved);
            if (progress.completedWeeks) {
                restoreCompletedWeeks(progress.completedWeeks);
            }
            return progress;
        }
    } catch(e) { /* localStorage not available */ }
    return null;
}

function getCompletedWeeks() {
    const completed = [];
    document.querySelectorAll('.week-item.completed').forEach(function(el) {
        completed.push(el.dataset.week);
    });
    return completed;
}

function getQuizScores() {
    try {
        const scores = localStorage.getItem('mm-quiz-scores');
        return scores ? JSON.parse(scores) : {};
    } catch(e) { return {}; }
}

function saveQuizScore(weekIndex, score, total) {
    try {
        const scores = getQuizScores();
        scores['week-' + weekIndex] = { score: score, total: total, date: new Date().toISOString() };
        localStorage.setItem('mm-quiz-scores', JSON.stringify(scores));
    } catch(e) { /* localStorage not available */ }
}

function restoreCompletedWeeks(weeks) {
    // Will be called after DOM is ready if progress exists
}

// Auto-save progress periodically
setInterval(saveProgress, 30000);

// Save on page unload
window.addEventListener('beforeunload', saveProgress);

// Load progress on init
document.addEventListener('DOMContentLoaded', function() {
    loadProgress();
});
