<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menopause Society Certification Study Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a4d2e;
            --primary-light: #2d6a45;
            --accent: #d4a574;
            --accent-bright: #e8b887;
            --bg-cream: #f8f6f1;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #4a4a4a;
            --text-light: #7a7a7a;
            --border: #e0ddd5;
            --shadow: rgba(26, 77, 46, 0.08);
            --shadow-heavy: rgba(26, 77, 46, 0.15);
            --correct: #2d6a45;
            --incorrect: #c1403d;
            --warning: #e8b887;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Crimson Pro', serif;
            font-weight: 600;
            line-height: 1.2;
        }

        /* Header - same as before */
        .header {
            background: var(--bg-white);
            border-bottom: 2px solid var(--border);
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Crimson Pro', serif;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 0.1rem;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-btn {
            padding: 0.6rem 1.4rem;
            border: 2px solid var(--primary);
            background: white;
            color: var(--primary);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--shadow-heavy);
        }

        .nav-btn.primary {
            background: var(--primary);
            color: white;
        }

        .nav-btn.primary:hover {
            background: var(--primary-light);
        }

        /* Main Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 3rem;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 2rem;
            height: fit-content;
            position: sticky;
            top: 120px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
        }

        .progress-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .progress-section h3 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .progress-bar {
            background: var(--border);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            height: 100%;
            transition: width 0.6s ease;
            border-radius: 6px;
        }

        .progress-text {
            font-size: 0.85rem;
            color: var(--text-mid);
            text-align: center;
        }

        .week-selector {
            list-style: none;
        }

        .week-item {
            padding: 0.9rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .week-item:hover {
            background: var(--bg-cream);
            border-color: var(--accent);
            transform: translateX(4px);
        }

        .week-item.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--shadow-heavy);
        }

        .week-item.completed {
            background: var(--accent-bright);
            color: var(--text-dark);
        }

        .week-check {
            font-size: 1.2rem;
        }

        /* Main Content */
        .main-content {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 3rem;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border);
            min-height: 600px;
        }

        .content-header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }

        .content-header h2 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .content-meta {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-mid);
        }

        .meta-icon {
            width: 20px;
            height: 20px;
            background: var(--accent-bright);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        /* Detailed Content Sections */
        .detail-section {
            margin: 2rem 0;
            padding: 2rem;
            background: var(--bg-cream);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        .detail-section h3 {
            color: var(--primary);
            margin-bottom: 1.2rem;
            font-size: 1.6rem;
        }

        .detail-section h4 {
            color: var(--primary-light);
            margin: 1.5rem 0 0.8rem 0;
            font-size: 1.2rem;
        }

        .detail-section p {
            margin-bottom: 1rem;
            line-height: 1.8;
            color: var(--text-mid);
        }

        .detail-section ul, .detail-section ol {
            margin-left: 1.5rem;
            margin-bottom: 1rem;
            line-height: 2;
        }

        .detail-section li {
            margin-bottom: 0.8rem;
            color: var(--text-mid);
        }

        .detail-section strong {
            color: var(--text-dark);
            font-weight: 600;
        }

        .highlight-box {
            background: linear-gradient(135deg, #fff9f0, #fef8f1);
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 1.5rem;
            margin: 1.5rem 0;
        }

        .highlight-box h4 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .clinical-pearl {
            background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
            border-left: 4px solid var(--primary-light);
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .clinical-pearl::before {
            content: "💎 Clinical Pearl";
            display: block;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.8rem;
        }

        .exam-tip {
            background: linear-gradient(135deg, #fff3cd, #fcf8e8);
            border-left: 4px solid #ffc107;
            padding: 1.2rem;
            margin: 1.5rem 0;
            border-radius: 8px;
        }

        .exam-tip::before {
            content: "🎯 Exam Tip";
            display: block;
            font-weight: 700;
            color: #856404;
            margin-bottom: 0.8rem;
        }

        /* Quiz Styles */
        .quiz-container {
            margin-top: 2rem;
        }

        .quiz-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 2rem;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }

        .quiz-header h3 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .quiz-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 1rem;
        }

        .quiz-stat {
            text-align: center;
        }

        .quiz-stat-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .quiz-stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .quiz-body {
            background: white;
            border: 2px solid var(--border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 2rem;
        }

        .question-card {
            background: var(--bg-cream);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 2px solid var(--border);
            transition: all 0.3s ease;
        }

        .question-card.answered {
            border-color: var(--accent);
        }

        .question-card.correct {
            background: linear-gradient(135deg, #e8f5e9, #f1f8f4);
            border-color: var(--correct);
        }

        .question-card.incorrect {
            background: linear-gradient(135deg, #ffebee, #fce4ec);
            border-color: var(--incorrect);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .question-number {
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .question-difficulty {
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .difficulty-easy {
            background: #d4edda;
            color: #155724;
        }

        .difficulty-medium {
            background: #fff3cd;
            color: #856404;
        }

        .difficulty-hard {
            background: #f8d7da;
            color: #721c24;
        }

        .question-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-dark);
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        .question-stem {
            background: white;
            padding: 1.2rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-style: italic;
            border-left: 3px solid var(--accent);
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.2rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
        }

        .option-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--shadow);
        }

        .option-letter {
            background: var(--bg-cream);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--primary);
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            line-height: 1.6;
        }

        .option-item.selected {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .option-item.selected .option-letter {
            background: white;
            color: var(--primary);
        }

        .option-item.correct {
            background: var(--correct);
            color: white;
            border-color: var(--correct);
        }

        .option-item.correct .option-letter {
            background: white;
            color: var(--correct);
        }

        .option-item.incorrect {
            background: var(--incorrect);
            color: white;
            border-color: var(--incorrect);
        }

        .option-item.incorrect .option-letter {
            background: white;
            color: var(--incorrect);
        }

        .explanation {
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }

        .explanation.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .explanation-header {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .explanation-content {
            line-height: 1.8;
            color: var(--text-mid);
        }

        .explanation-content strong {
            color: var(--text-dark);
        }

        .reference {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-light);
            font-style: italic;
        }

        .quiz-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
        }

        .btn {
            padding: 1rem 2rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow-heavy);
        }

        .btn-secondary {
            background: var(--bg-cream);
            color: var(--primary);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--accent-bright);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn:disabled:hover {
            transform: none;
        }

        .score-summary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 3rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 2rem;
        }

        .score-summary h3 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .score-number {
            font-size: 4rem;
            font-weight: 700;
            display: block;
            margin: 1rem 0;
        }

        .score-feedback {
            font-size: 1.2rem;
            opacity: 0.95;
            margin-top: 1rem;
        }

        .score-breakdown {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 2rem;
            background: rgba(255,255,255,0.1);
            padding: 2rem;
            border-radius: 10px;
        }

        .breakdown-item {
            text-align: center;
        }

        .breakdown-number {
            font-size: 2rem;
            font-weight: 700;
            display: block;
        }

        .breakdown-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-top: 0.5rem;
        }

        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: relative;
                top: 0;
            }

            .quiz-stats, .score-breakdown {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">M</div>
                <div class="logo-text">
                    <h1>Menopause Mastery</h1>
                    <p>Certification Study Platform</p>
                </div>
            </div>
            <nav class="header-nav">
                <button class="nav-btn" onclick="showView('overview')">Overview</button>
                <button class="nav-btn" onclick="showView('study')">Study Guide</button>
                <button class="nav-btn primary" onclick="showView('quiz')">Practice Quiz</button>
            </nav>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar">
            <div class="progress-section">
                <h3>Your Progress</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                </div>
                <p class="progress-text"><span id="progressText">0 of 10 weeks</span></p>
            </div>

            <h3 style="margin-bottom: 1rem; color: var(--primary);">Study Plan</h3>
            <ul class="week-selector" id="weekSelector"></ul>
        </aside>

        <main class="main-content" id="mainContent"></main>
    </div>

<script>
// Comprehensive Study Data with Detailed Week Guides
const studyData = {
    weeks: [
        {
            week: 1,
            title: "Menopause Fundamentals",
            pages: "1-22",
            estimatedHours: "5-7 hours",
            learningObjectives: [
                "Define and differentiate the stages of reproductive aging using STRAW+10 criteria",
                "Explain the physiological changes during the menopause transition",
                "Identify causes and management of primary ovarian insufficiency",
                "Understand adrenal physiology changes in menopause"
            ],
            detailedContent: {
                overview: "This foundational week establishes critical terminology and staging systems that will be referenced throughout your study. The STRAW+10 staging system is heavily tested and forms the basis for understanding when and how to intervene clinically.",
                
                sections: [
                    {
                        title: "Menopause Demographics and Terminology",
                        content: `
                            <h4>Key Definitions (Memorize These)</h4>
                            <ul>
                                <li><strong>Menopause:</strong> The permanent cessation of menstruation - defined retrospectively after 12 consecutive months of amenorrhea (in absence of other causes)</li>
                                <li><strong>Perimenopause:</strong> The period immediately before menopause (when endocrine and clinical features of approaching menopause begin) and the first year after menopause</li>
                                <li><strong>Menopause Transition:</strong> The period from onset of irregular cycles until final menstrual period</li>
                                <li><strong>Postmenopause:</strong> The period after the final menstrual period, regardless of whether it was induced or spontaneous</li>
                                <li><strong>Premature Menopause:</strong> Menopause occurring before age 40</li>
                                <li><strong>Early Menopause:</strong> Menopause occurring between ages 40-45</li>
                                <li><strong>Climacteric:</strong> The phase of aging marking transition from reproductive to non-reproductive years (less commonly used term)</li>
                            </ul>

                            <div class="clinical-pearl">
                                The median age of menopause in Western countries is 51-52 years. Age hasn't changed over time despite increasing life expectancy. Women now spend ~40% of their lives postmenopausal.
                            </div>

                            <h4>Global Demographics</h4>
                            <ul>
                                <li>In 1990: 471 million women worldwide were ≥50 years</li>
                                <li>In 2015: 861 million women (82.6% increase)</li>
                                <li>By 2060: ~90 million US women will be ≥50 years</li>
                                <li>Life expectancy for US females: 81.2 years</li>
                                <li>67.2% of US women survive from age 50 to 80</li>
                            </ul>
                        `
                    },
                    {
                        title: "STRAW+10 Staging System",
                        content: `
                            <div class="exam-tip">
                                STRAW+10 is THE MOST TESTED concept in Chapter 1. You must know all 7 stages, their criteria, and what hormonal changes occur in each.
                            </div>

                            <h4>The Seven Stages</h4>
                            
                            <strong>REPRODUCTIVE YEARS (Stages -5 to -3):</strong>
                            <ul>
                                <li><strong>Stage -5 (Early):</strong> Variable to regular cycles, FSH normal</li>
                                <li><strong>Stage -4 (Peak):</strong> Regular cycles, FSH normal</li>
                                <li><strong>Stage -3 (Late):</strong> Regular cycles, subtle changes in flow/length, FSH normal, AMH and AFC declining</li>
                            </ul>

                            <strong>MENOPAUSAL TRANSITION (Stages -2 and -1):</strong>
                            <ul>
                                <li><strong>Stage -2 (Early):</strong> Variable cycle length (>7 days different from normal), FSH may be elevated in early follicular phase</li>
                                <li><strong>Stage -1 (Late):</strong> ≥2 skipped cycles AND interval of amenorrhea ≥60 days, FSH >25 IU/L</li>
                            </ul>

                            <strong>POSTMENOPAUSE (Stages +1 and +2):</strong>
                            <ul>
                                <li><strong>Stage +1a (Early, first year):</strong> Amenorrhea duration 1-3 years, FSH very elevated, estradiol very low</li>
                                <li><strong>Stage +1b (Early):</strong> 1-3 years duration, stabilization of FSH and estradiol</li>
                                <li><strong>Stage +1c (Early):</strong> 3-6 years, continuing hormonal stabilization</li>
                                <li><strong>Stage +2 (Late):</strong> Remaining lifespan, somatic aging dominates</li>
                            </ul>

                            <div class="highlight-box">
                                <h4>Critical STRAW+10 Testing Points</h4>
                                <ul>
                                    <li>The transition from Stage -3 to -2 is marked by cycle irregularity (>7 day variation)</li>
                                    <li>Stage -1 requires BOTH irregular cycles AND ≥60 days amenorrhea</li>
                                    <li>Menopause is confirmed ONLY after 12 months amenorrhea</li>
                                    <li>FSH can fluctuate during transition - single measurement not diagnostic</li>
                                    <li>AMH and AFC are better markers of reproductive aging than FSH</li>
                                </ul>
                            </div>
                        `
                    },
                    {
                        title: "Physiology of the Menopause Transition",
                        content: `
                            <h4>Hormonal Changes</h4>
                            
                            <strong>Early Transition (Stage -2):</strong>
                            <ul>
                                <li>Declining follicle pool → decreased inhibin B</li>
                                <li>Loss of negative feedback → rising FSH (especially early follicular phase)</li>
                                <li>Accelerated follicular development → shorter follicular phase</li>
                                <li>May have normal or even elevated estradiol</li>
                                <li>Ovulation still occurs but cycles become irregular</li>
                            </ul>

                            <strong>Late Transition (Stage -1):</strong>
                            <ul>
                                <li>Further follicle depletion → more skipped cycles</li>
                                <li>FSH >25 IU/L common</li>
                                <li>Variable estradiol (can have high levels from prolonged follicular phases)</li>
                                <li>Anovulatory cycles become more frequent</li>
                                <li>Progesterone production decreases</li>
                            </ul>

                            <strong>Postmenopause:</strong>
                            <ul>

                    explanation: 'Despite having an intact uterus, this woman needs estrogen plus progestogen therapy for endometrial protection. The presence of a uterus (not ovaries) determines the need for progestogen. Additionally, given her young age at surgical menopause, hormone therapy until at least age 51 is recommended to reduce risks associated with early estrogen deficiency.',
                    reference: 'Menopause Practice, Chapter 11',
                    topic: 'HT Principles'
                },
                {
                    id: 25,
                    difficulty: 'medium',
                    question: 'What is the approximate normal range for age at natural menopause?',
                    options: [
                        '35-45 years',
                        '40-58 years',
                        '45-65 years',
                        '50-70 years'
                    ],
                    correctAnswer: 1,
                    explanation: 'The normal range for natural menopause is approximately 40-58 years, with the median around 51-52 years. Menopause before age 40 is considered premature (POI), and menopause between 40-45 is considered early. Both are associated with increased health risks and typically warrant evaluation and intervention.',
                    reference: 'Menopause Practice, Chapter 1, Page 1',
                    topic: 'Demographics'
                }
            ]
        },
        // Additional quiz sets for other weeks would go here
        {
            id: 'comprehensive-practice',
            title: 'Comprehensive Practice Exam',
            description: 'Mixed questions covering all major topics - simulates actual exam',
            totalQuestions: 50,
            passingScore: 75,
            questions: [] // Would be populated with questions from all chapters
        }
    ]
};
// Main Application Logic
let currentProgress = 0;
let completedWeeks = new Set();
let quizState = {
    currentQuiz: null,
    currentQuestionIndex: 0,
    answers: {},
    score: 0,
    showingResults: false
};

// Initialize application
function init() {
    renderWeekSelector();
    showWelcomeScreen();
    loadProgress();
}

// Load saved progress from localStorage
function loadProgress() {
    const saved = localStorage.getItem('menopauseStudyProgress');
    if (saved) {
        const data = JSON.parse(saved);
        completedWeeks = new Set(data.completedWeeks || []);
        currentProgress = (completedWeeks.size / studyData.weeks.length) * 100;
        updateProgressBar();
    }
}

// Save progress to localStorage
function saveProgress() {
    const data = {
        completedWeeks: Array.from(completedWeeks),
        lastUpdated: new Date().toISOString()
    };
    localStorage.setItem('menopauseStudyProgress', JSON.stringify(data));
}

// Update progress bar
function updateProgressBar() {
    document.getElementById('progressBar').style.width = currentProgress + '%';
    document.getElementById('progressText').textContent = 
        `${completedWeeks.size} of ${studyData.weeks.length} weeks completed`;
}

// Render week selector in sidebar
function renderWeekSelector() {
    const selector = document.getElementById('weekSelector');
    selector.innerHTML = '';

    studyData.weeks.forEach((week, index) => {
        const li = document.createElement('li');
        li.className = 'week-item';
        if (completedWeeks.has(index)) {
            li.classList.add('completed');
        }
        
        li.innerHTML = `
            <span>Week ${week.week}: ${week.title}</span>
            <span class="week-check">${completedWeeks.has(index) ? '✓' : ''}</span>
        `;
        
        li.onclick = () => showWeekDetail(index);
        selector.appendChild(li);
    });
}

// Show welcome/overview screen
function showWelcomeScreen() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div style="text-align: center; padding: 4rem 2rem;">
            <h2 style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                Welcome to Your Certification Journey
            </h2>
            <p style="font-size: 1.2rem; color: var(--text-mid); max-width: 700px; margin: 0 auto 3rem; line-height: 1.8;">
                This 10-week study plan will guide you through all the material you need to pass 
                the Menopause Society Certification Exam with confidence.
            </p>
            
            <div style="background: var(--bg-cream); border-radius: 12px; padding: 2rem; margin-top: 3rem;">
                <h3 style="color: var(--primary); margin-bottom: 1.5rem; font-size: 1.8rem;">
                    Your 10-Week Roadmap
                </h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                    ${studyData.weeks.map((week, index) => `
                        <div style="background: white; padding: 1.5rem; border-radius: 10px; 
                                    border: 2px solid ${completedWeeks.has(index) ? 'var(--primary-light)' : 'var(--border)'}; 
                                    cursor: pointer;" onclick="showWeekDetail(${index})">
                            <div style="font-weight: 700; color: var(--primary); font-size: 1.1rem; margin-bottom: 0.5rem;">
                                Week ${week.week} ${completedWeeks.has(index) ? '✓' : ''}
                            </div>
                            <div style="font-size: 0.9rem; color: var(--text-mid);">
                                ${week.title}
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div style="margin-top: 3rem;">
                <button class="btn btn-primary" onclick="showWeekDetail(0)" 
                        style="font-size: 1.1rem; padding: 1.2rem 3rem;">
                    Start Week 1 →
                </button>
            </div>
        </div>
    `;
}

// Show detailed week view
function showWeekDetail(weekIndex) {
    const week = studyData.weeks[weekIndex];
    const content = document.getElementById('mainContent');
    
    // Update sidebar
    document.querySelectorAll('.week-item').forEach((item, i) => {
        item.classList.remove('active');
        if (i === weekIndex) item.classList.add('active');
    });

    content.innerHTML = `
        <div class="content-header">
            <h2>Week ${week.week}: ${week.title}</h2>
            <div class="content-meta">
                <div class="meta-item">
                    <div class="meta-icon">📖</div>
                    <span>Pages ${week.pages}</span>
                </div>
                <div class="meta-item">
                    <div class="meta-icon">⏱️</div>
                    <span>${week.estimatedHours}</span>
                </div>
                <div class="meta-item">
                    <div class="meta-icon">🎯</div>
                    <span>${week.learningObjectives.length} Learning Objectives</span>
                </div>
            </div>
        </div>

        <div class="detail-section">
            <h3>📚 Overview</h3>
            <p>${week.detailedContent.overview}</p>
        </div>

        <div class="detail-section">
            <h3>🎯 Learning Objectives</h3>
            <p>By the end of this week, you should be able to:</p>
            <ul>
                ${week.learningObjectives.map(obj => `<li>${obj}</li>`).join('')}
            </ul>
        </div>

        ${week.detailedContent.sections.map(section => `
            <div class="detail-section">
                <h3>${section.title}</h3>
                ${section.content}
            </div>
        `).join('')}

        ${week.studyStrategy ? `
            <div class="detail-section">
                ${week.studyStrategy}
            </div>
        ` : ''}

        ${week.keyTakeaways ? `
            <div class="highlight-box">
                <h4>🔑 Key Takeaways</h4>
                <ul>
                    ${week.keyTakeaways.map(point => `<li>${point}</li>`).join('')}
                </ul>
            </div>
        ` : ''}

        <div style="display: flex; gap: 1rem; margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--border);">
            <button class="btn btn-secondary" onclick="showWeekDetail(${Math.max(0, weekIndex - 1)})" 
                    ${weekIndex === 0 ? 'disabled' : ''}>
                ← Previous Week
            </button>
            <button class="btn btn-primary" onclick="markWeekComplete(${weekIndex})" style="flex: 1;">
                ${completedWeeks.has(weekIndex) ? '✓ Completed' : 'Mark Week Complete'}
            </button>
            <button class="btn btn-secondary" onclick="showWeekDetail(${Math.min(studyData.weeks.length - 1, weekIndex + 1)})" 
                    ${weekIndex === studyData.weeks.length - 1 ? 'disabled' : ''}>
                Next Week →
            </button>
        </div>
    `;
}

// Mark week as complete
function markWeekComplete(weekIndex) {
    if (!completedWeeks.has(weekIndex)) {
        completedWeeks.add(weekIndex);
        currentProgress = Math.round((completedWeeks.size / studyData.weeks.length) * 100);
        updateProgressBar();
        renderWeekSelector();
        saveProgress();
        
        if (completedWeeks.size === studyData.weeks.length) {
            alert('🎉 Congratulations! You\'ve completed all 10 weeks! You\'re ready for the exam!');
        }
    }
}

// Show quiz view
function showView(view) {
    if (view === 'overview') {
        showWelcomeScreen();
    } else if (view === 'study') {
        showWeekDetail(0);
    } else if (view === 'quiz') {
        showQuizSelection();
    }
}

// Show quiz selection
function showQuizSelection() {
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="content-header">
            <h2>Practice Quizzes</h2>
            <p style="margin-top: 1rem; color: var(--text-mid);">
                Test your knowledge with these comprehensive practice questions
            </p>
        </div>

        <div style="display: grid; gap: 1.5rem; margin-top: 2rem;">
            ${quizData.quizzes.map(quiz => `
                <div style="background: var(--bg-cream); border: 2px solid var(--border); 
                            border-radius: 12px; padding: 2rem; cursor: pointer; transition: all 0.3s ease;"
                     onmouseover="this.style.borderColor='var(--accent)'; this.style.transform='translateY(-4px)'"
                     onmouseout="this.style.borderColor='var(--border)'; this.style.transform='translateY(0)'"
                     onclick="startQuiz('${quiz.id}')">
                    <h3 style="color: var(--primary); margin-bottom: 1rem;">${quiz.title}</h3>
                    <p style="color: var(--text-mid); margin-bottom: 1rem;">${quiz.description}</p>
                    <div style="display: flex; gap: 2rem; font-size: 0.9rem; color: var(--text-light);">
                        <span>📝 ${quiz.totalQuestions} questions</span>
                        <span>✅ ${quiz.passingScore}% to pass</span>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
}

// Start a quiz
function startQuiz(quizId) {
    const quiz = quizData.quizzes.find(q => q.id === quizId);
    if (!quiz || quiz.questions.length === 0) {
        alert('This quiz is coming soon!');
        return;
    }
    
    quizState = {
        currentQuiz: quiz,
        currentQuestionIndex: 0,
        answers: {},
        score: 0,
        showingResults: false
    };
    
    showQuestion();
}

// Show current question
function showQuestion() {
    const quiz = quizState.currentQuiz;
    const question = quiz.questions[quizState.currentQuestionIndex];
    const content = document.getElementById('mainContent');
    
    content.innerHTML = `
        <div class="quiz-container">
            <div class="quiz-header">
                <h3>${quiz.title}</h3>
                <div class="quiz-stats">
                    <div class="quiz-stat">
                        <span class="quiz-stat-number">${quizState.currentQuestionIndex + 1}</span>
                        <span class="quiz-stat-label">of ${quiz.questions.length}</span>
                    </div>
                    <div class="quiz-stat">
                        <span class="quiz-stat-number">${Object.keys(quizState.answers).length}</span>
                        <span class="quiz-stat-label">Answered</span>
                    </div>
                </div>
            </div>
            
            <div class="quiz-body">
                <div class="question-card ${quizState.answers[question.id] !== undefined ? 'answered' : ''}">
                    <div class="question-header">
                        <span class="question-number">Question ${quizState.currentQuestionIndex + 1}</span>
                        <span class="question-difficulty difficulty-${question.difficulty}">
                            ${question.difficulty.toUpperCase()}
                        </span>
                    </div>
                    
                    ${question.stem ? `<div class="question-stem">${question.stem}</div>` : ''}
                    
                    <div class="question-text">${question.question}</div>
                    
                    <ul class="options-list">
                        ${question.options.map((option, index) => {
                            const isSelected = quizState.answers[question.id] === index;
                            return `
                                <li class="option-item ${isSelected ? 'selected' : ''}" 
                                    onclick="selectAnswer(${question.id}, ${index})">
                                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                                    <div class="option-text">${option}</div>
                                </li>
                            `;
                        }).join('')}
                    </ul>
                    
                    <div class="explanation ${quizState.answers[question.id] !== undefined ? 'show' : ''}">
                        <div class="explanation-header">
                            ${quizState.answers[question.id] === question.correctAnswer ? '✅ Correct!' : '❌ Incorrect'}
                        </div>
                        <div class="explanation-content">
                            <strong>Correct Answer: ${String.fromCharCode(65 + question.correctAnswer)}</strong>
                            <p>${question.explanation}</p>
                        </div>
                        <div class="reference">📖 ${question.reference} | Topic: ${question.topic}</div>
                    </div>
                </div>
                
                <div class="quiz-actions">
                    <button class="btn btn-secondary" 
                            onclick="previousQuestion()" 
                            ${quizState.currentQuestionIndex === 0 ? 'disabled' : ''}>
                        ← Previous
                    </button>
                    
                    ${quizState.currentQuestionIndex < quiz.questions.length - 1 ? `
                        <button class="btn btn-primary" onclick="nextQuestion()">
                            Next Question →
                        </button>
                    ` : `
                        <button class="btn btn-primary" onclick="finishQuiz()">
                            Finish Quiz
                        </button>
                    `}
                </div>
            </div>
        </div>
    `;
}

// Select an answer
function selectAnswer(questionId, answerIndex) {
    if (quizState.answers[questionId] !== undefined) return; // Already answered
    
    quizState.answers[questionId] = answerIndex;
    showQuestion(); // Refresh to show explanation
}

// Navigate to next question
function nextQuestion() {
    if (quizState.currentQuestionIndex < quizState.currentQuiz.questions.length - 1) {
        quizState.currentQuestionIndex++;
        showQuestion();
    }
}

// Navigate to previous question
function previousQuestion() {
    if (quizState.currentQuestionIndex > 0) {
        quizState.currentQuestionIndex--;
        showQuestion();
    }
}

// Finish quiz and show results
function finishQuiz() {
    const quiz = quizState.currentQuiz;
    let correct = 0;
    
    quiz.questions.forEach(q => {
        if (quizState.answers[q.id] === q.correctAnswer) {
            correct++;
        }
    });
    
    const percentage = Math.round((correct / quiz.questions.length) * 100);
    const passed = percentage >= quiz.passingScore;
    
    const content = document.getElementById('mainContent');
    content.innerHTML = `
        <div class="score-summary">
            <h3>Quiz Complete!</h3>
            <span class="score-number">${percentage}%</span>
            <div class="score-feedback">
                ${passed ? 
                    '🎉 Congratulations! You passed this quiz!' : 
                    '📚 Keep studying! Review the explanations and try again.'}
            </div>
            
            <div class="score-breakdown">
                <div class="breakdown-item">
                    <span class="breakdown-number">${correct}</span>
                    <span class="breakdown-label">Correct</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-number">${quiz.questions.length - correct}</span>
                    <span class="breakdown-label">Incorrect</span>
                </div>
                <div class="breakdown-item">
                    <span class="breakdown-number">${quiz.passingScore}%</span>
                    <span class="breakdown-label">Passing Score</span>
                </div>
            </div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-secondary" onclick="showQuizSelection()">
                    Back to Quizzes
                </button>
                <button class="btn btn-primary" onclick="startQuiz('${quiz.id}')">
                    Retake Quiz
                </button>
            </div>
        </div>
    `;
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
